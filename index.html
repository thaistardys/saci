<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACI - Sistema de Acompanhamento de Chamados de Impressoras</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Chamadas obrigatórias divididas no head com defer (A ordem importa) -->
    <script src="script.js" defer></script>

</head>
<body>

    <header class="max-container">
        <div class="logo">🖨️ SACI</div>
        <button id="btn-novo-chamado" class="btn-primary">+ Novo</button>
    </header>

    <main class="max-container">
        <section class="busca-container">
            <input type="text" id="input-busca" placeholder="🔍 Buscar por Nº do chamado, Ticket ou Nº de Série...">
        </section>

        <section class="tabs-container">
            <button class="tab-button active" data-status="aberto">
                <span class="tab-title">Em Aberto</span>
                <span id="badge-aberto" class="badge">0</span>
            </button>
            <button class="tab-button" data-status="atendimento">
                <span class="tab-title">Em Atendimento</span>
                <span id="badge-atendimento" class="badge">0</span>
            </button>
            <button class="tab-button" data-status="encerrado">
                <span class="tab-title">Encerrados</span>
                <span id="badge-encerrado" class="badge">0</span>
            </button>
        </section>

        <section id="lista-chamados" class="chamados-list"></section>
    </main>

    <footer class="max-container">
        <p>&copy; 2026 SACI - Todos os direitos reservados.</p>
        <p>Versão 1.0.0 | Desenvolvedor: Interno</p>
    </footer>

    <div id="modal-cadastro" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header-top">
                <h2 id="modal-cadastro-titulo">Novo Chamado Interno</h2>
                <button type="button" class="btn-close-x id-fechar-modal">&times;</button>
            </div>
            <form id="form-cadastro">
                <input type="hidden" id="editando-id">
                <div class="form-group">
                    <label for="chamado-id">Número do Chamado Interno *</label>
                    <input type="text" id="chamado-id" required placeholder="Digite o número do seu sistema">
                </div>
                <div class="form-group">
                    <label for="colaborador">Colaborador Responsável *</label>
                    <input type="text" id="colaborador" required placeholder="Nome de quem identificou">
                </div>
                <div class="form-group">
                    <label for="data-abertura">Data e Hora de Abertura *</label>
                    <input type="datetime-local" id="data-abertura" required>
                </div>
                <div class="form-group">
                    <label for="descricao">Descrição do Defeito *</label>
                    <textarea id="descricao" required placeholder="Detalhes do problema com a impressora..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary id-fechar-modal">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar Chamado</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-encerramento" class="modal-overlay">
        <div class="modal-content">
            <h2>Encerrar Chamado Técnico</h2>
            <form id="form-encerramento">
                <input type="hidden" id="encerrar-id">
                <div class="form-group">
                    <label for="relato-tecnico">Relato Detalhado do Técnico *</label>
                    <textarea id="relato-tecnico" required placeholder="O que foi feito para resolver o problema?"></textarea>
                </div>
                <div class="form-group row">
                    <input type="checkbox" id="houve-troca-peca">
                    <label for="houve-troca-peca">Houve troca efetiva de peças?</label>
                </div>
                <div class="form-group" id="campo-peca-encerramento-detalhe" style="display: none;">
                    <label for="peca-encerramento-descricao">Quais peças foram trocadas? *</label>
                    <textarea id="peca-encerramento-descricao" placeholder="Liste as peças substituídas..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary id-fechar-modal">Voltar</button>
                    <button type="submit" class="btn-danger">Encerrar Ticket</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-alerta" class="modal-overlay">
        <div class="modal-content">
            <h3 id="alerta-titulo">Aviso</h3>
            <p id="alerta-mensagem"></p>
            <div class="modal-actions centralizado">
                <button type="button" class="btn-primary id-fechar-alerta">Ok</button>
            </div>
        </div>
    </div>

    <div id="modal-confirmacao-exclusao" class="modal-overlay">
        <div class="modal-content">
            <h2>Confirmar Exclusão</h2>
            <p>Tem certeza absoluta que deseja excluir este chamado de forma permanente? Esta ação não poderá ser desfeita.</p>
            <input type="hidden" id="excluir-id">
            <div class="modal-actions">
                <button type="button" class="btn-secondary id-fechar-modal">Cancelar</button>
                <button type="button" id="btn-confirmar-exclusao-definitiva" class="btn-danger">Excluir Permanentemente</button>
            </div>
        </div>
    </div>

</body>
</html>
